// ─── PERFECT RECORD DATA ─────────────────────────────────────────────────────
function buildPerfectData(){
  const byTeam={};
  for(const g of MODEL_GAMES){
    [g.home,g.away].forEach(t=>{if(!byTeam[t])byTeam[t]=[];});
    byTeam[g.home].push({opponent:g.away,winProb:g.homeProb});
    byTeam[g.away].push({opponent:g.home,winProb:g.awayProb});
  }
  return Object.entries(byTeam).map(([team,games])=>({
    team,group:teamGroup(team),games,
    perfect:games.reduce((a,g)=>a*g.winProb,1)
  })).sort((a,b)=>b.perfect-a.perfect);
}
const PERFECT_DATA=buildPerfectData();

// ─── CACHE HELPERS ────────────────────────────────────────────────────────────
// Finished games stored permanently in localStorage — scores never change.
const CACHE_KEY = "wc2026_openfootball_v1";

function loadCache() {
  try { const r = localStorage.getItem(CACHE_KEY); return r ? JSON.parse(r) : {}; }
  catch { return {}; }
}
function saveCache(c) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(c)); } catch {}
}
function gameKey(h, a) { return `${h}_${a}`; }

// openfootball name → our internal name
const OF_NAME_MAP = {
  "Czech Republic": "Czechia",
  "Bosnia & Herzegovina": "Bosnia",
  "Bosnia And Herzegovina": "Bosnia",
  "Cote d'Ivoire": "Ivory Coast",
  "Ivory Coast": "Ivory Coast",
  "DR Congo": "DR Congo",
  "Congo DR": "DR Congo",
  "Korea Republic": "South Korea",
  "United States": "USA",
  "Türkiye": "Turkey",
  "Turkey": "Turkey",
  "Curaçao": "Curacao",
  "Curacao": "Curacao",
};
function ofName(n) { return OF_NAME_MAP[n] || n; }

// Parse openfootball matches array into our format
function parseOpenfootball(data) {
  const matches = data.matches || [];
  // Only group stage (rounds that start with "Matchday")
  return matches
    .filter(m => m.round && m.round.startsWith("Matchday"))
    .map(m => {
      const home = ofName(m.team1 || "");
      const away = ofName(m.team2 || "");
      const ft = m.score?.ft;
      const played = Array.isArray(ft) && ft.length === 2 && ft[0] !== null;
      const homeGoals = played ? ft[0] : null;
      const awayGoals = played ? ft[1] : null;
      const group = teamGroup(home) !== "?" ? teamGroup(home) : teamGroup(away);
      return { home, away, homeGoals, awayGoals, group, played, live: false };
    })
    .filter(f => f.group !== "?" && f.home && f.away);
}

// ─── DATA FETCH HOOK ──────────────────────────────────────────────────────────
// Uses openfootball GitHub raw JSON — completely free, no key required.
// Updated ~daily by maintainer. Scores cached permanently once finished.
const DATA_URL = "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json";

function useWorldCupData() {
  const [results, setResults] = useState(() => Object.values(loadCache()));
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [cacheStats, setCacheStats] = useState({ cached: Object.keys(loadCache()).length, total: 72 });

  const fetchData = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const res = await fetch(DATA_URL);
      if (!res.ok) throw new Error(`Fetch error ${res.status}`);
      const data = await res.json();
      const normalised = parseOpenfootball(data);

      // Merge with cache — persist newly finished games permanently
      const cache = loadCache();
      let dirty = false;
      for (const f of normalised) {
        const k = gameKey(f.home, f.away);
        if (f.played && !cache[k]) { cache[k] = f; dirty = true; }
      }
      if (dirty) saveCache(cache);

      // Use cached score for finished games, fresh data for unplayed
      const merged = normalised.map(f => {
        const k = gameKey(f.home, f.away);
        return (cache[k] && cache[k].played) ? cache[k] : f;
      });

      // Fill in any games missing from the feed using cache
      const inFeed = new Set(normalised.map(f => gameKey(f.home, f.away)));
      const cached = Object.values(cache).filter(f => !inFeed.has(gameKey(f.home, f.away)));

      setResults([...merged, ...cached]);
      setLastUpdated(new Date());
      setCacheStats({ cached: Object.keys(cache).length, total: 72 });
    } catch(e) {
      setError(e.message);
      // Graceful fallback to cache on network error
      const cache = loadCache();
      if (Object.keys(cache).length > 0) {
        setResults(Object.values(cache));
        setError(`Network error — showing ${Object.keys(cache).length} cached results`);
      }
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { fetchData(); }, [fetchData]);

  const clearCache = useCallback(() => {
    try { localStorage.removeItem(CACHE_KEY); } catch {}
    setResults([]);
    setCacheStats({ cached: 0, total: 72 });
    fetchData();
  }, [fetchData]);

  return { results, loading, error, lastUpdated, cacheStats, refetch: fetchData, clearCache };
}

// ─── COMPUTE POINTS FROM RESULTS ─────────────────────────────────────────────
function computeActualPoints(results) {
  const pts = {};
  for(const g of results) {
    if(!g.played) continue;
    if(!pts[g.home]) pts[g.home]=0;
    if(!pts[g.away]) pts[g.away]=0;
    if(g.homeGoals>g.awayGoals) pts[g.home]+=3;
    else if(g.awayGoals>g.homeGoals) pts[g.away]+=3;
    else{pts[g.home]+=1;pts[g.away]+=1;}
  }
  return pts;
}

function computeActualGD(results) {
  const gd={};
  for(const g of results){
    if(!g.played) continue;
    if(!gd[g.home]) gd[g.home]=0;
    if(!gd[g.away]) gd[g.away]=0;
    gd[g.home]+=(g.homeGoals-g.awayGoals);
    gd[g.away]+=(g.awayGoals-g.homeGoals);
  }
  return gd;
}

function computeModelPlayedPts(results) {
  const pts={};
  for(const real of results){
    if(!real.played) continue;
    const mg=MODEL_GAMES.find(m=>(m.home===real.home&&m.away===real.away)||(m.home===real.away&&m.away===real.home));
    if(!mg) continue;
    [real.home,real.away].forEach(t=>{if(!pts[t])pts[t]=0;});
    const hp=mg.home===real.home?mg.homeProb:mg.awayProb;
    const ap=mg.home===real.home?mg.awayProb:mg.homeProb;
    if(hp>=0.625){pts[real.home]+=3;}
    else if(ap>=0.625){pts[real.away]+=3;}
    else{pts[real.home]+=1;pts[real.away]+=1;}
  }
  return pts;
}

function computeRemainingModelPts(results) {
  const pts={};
  for(const real of results){
    if(real.played) continue;
    const mg=MODEL_GAMES.find(m=>(m.home===real.home&&m.away===real.away)||(m.home===real.away&&m.away===real.home));
    if(!mg) continue;
    [real.home,real.away].forEach(t=>{if(!pts[t])pts[t]=0;});
    const hp=mg.home===real.home?mg.homeProb:mg.awayProb;
    const ap=mg.home===real.home?mg.awayProb:mg.homeProb;
    if(hp>=0.625){pts[real.home]=(pts[real.home]||0)+3;}
    else if(ap>=0.625){pts[real.away]=(pts[real.away]||0)+3;}
    else{pts[real.home]=(pts[real.home]||0)+1;pts[real.away]=(pts[real.away]||0)+1;}
  }
  return pts;
}

              <div key={i} style={S.detailCard}>
                <div style={S.detailLabel}>Game {i+1}</div>
                <div style={{fontSize:11,color:"#ccc",marginBottom:4}}>{getFlag(g.opponent)} vs {g.opponent}</div>
                <div style={{fontSize:20,fontWeight:700,color:probColor(g.winProb)}}>{pct(g.winProb)}</div>
              </div>
            ))}
            <div style={{...S.detailCard,background:"rgba(255,255,255,0.07)"}}>
              <div style={S.detailLabel}>Combined</div>
              <div style={{fontSize:11,color:"#ccc",marginBottom:4}}>Win all 3</div>
              <div style={{fontSize:22,fontWeight:700,color:probColor(sel.perfect)}}>{pct(sel.perfect)}</div>
              <div style={{fontSize:9,color:"#555",marginTop:3}}>{sel.games.map(g=>pct(g.winProb)).join(" × ")}</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── TAB 2: GROUP RESULTS ─────────────────────────────────────────────────────
function Tab2({results,loading,error,refetch,groupFilter,setGroupFilter}){
  const groups=["ALL","A","B","C","D","E","F","G","H","I","J","K","L"];
  if(loading) return <><FilterBar groups={groups} filter={groupFilter} setFilter={setGroupFilter}/><LoadingSpinner/></>;
  if(error) return <><FilterBar groups={groups} filter={groupFilter} setFilter={setGroupFilter}/><ApiError error={error} refetch={refetch}/></>;
  const actualPts=computeActualPoints(results);
  const actualGD=computeActualGD(results);
  return(
    <div>
      <FilterBar groups={groups} filter={groupFilter} setFilter={setGroupFilter}/>
      {Object.entries(GROUPS).filter(([g])=>groupFilter==="ALL"||g===groupFilter).map(([grp,teams])=>{
        const grpGames=results.filter(g=>g.group===grp);
        const allGrpGames=MODEL_GAMES.filter(g=>g.group===grp);
        const playedCount=grpGames.filter(g=>g.played).length;
        const standings=teams.map(t=>({team:t,pts:actualPts[t]||0,gd:actualGD[t]||0,gp:results.filter(g=>g.played&&(g.home===t||g.away===t)).length}))
          .sort((a,b)=>b.pts-a.pts||b.gd-a.gd);
        return(
          <div key={grp} style={{marginBottom:22}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{width:30,height:30,borderRadius:6,background:GC[grp],display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:15,color:"#fff"}}>{grp}</div>
              <span style={{fontSize:14,fontWeight:600,color:"#ddd"}}>Group {grp}</span>
              <span style={{fontSize:10,color:"#555"}}>{playedCount}/{allGrpGames.length} played</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div style={S.card}>
                <div style={S.cardLabel}>Standings</div>
                <div style={{display:"flex",gap:3,marginBottom:5,fontSize:8,color:"#444",textTransform:"uppercase",letterSpacing:"0.08em"}}>
                  <span style={{width:16}}></span><span style={{width:18}}></span>
                  <span style={{flex:1}}>Team</span>
                  <span style={{width:20,textAlign:"center"}}>GP</span>
                  <span style={{width:26,textAlign:"center"}}>GD</span>
                  <span style={{width:22,textAlign:"right"}}>Pts</span>
                </div>
                {standings.map((s,i)=>(
                  <div key={s.team} style={{display:"flex",alignItems:"center",gap:3,padding:"5px 0",borderBottom:i<3?"1px solid rgba(255,255,255,0.05)":"none"}}>
                    <span style={{width:16,fontSize:10,color:"#444",fontWeight:700}}>{i+1}</span>
                    <span style={{fontSize:14,width:18}}>{getFlag(s.team)}</span>
                    <span style={{flex:1,fontSize:10,fontWeight:600}}>{s.team}</span>
                    <span style={{width:20,textAlign:"center",fontSize:10,color:"#555"}}>{s.gp}</span>
                    <span style={{width:26,textAlign:"center",fontSize:10,color:s.gd>0?"#4ade80":s.gd<0?"#f87171":"#666"}}>{s.gd>0?"+":""}{s.gd}</span>
                    <span style={{width:22,textAlign:"right",fontSize:13,fontWeight:800,color:i===0?"#4ade80":i===1?"#facc15":"#aaa"}}>{s.pts}</span>
                  </div>
                ))}
              </div>
              <div style={S.card}>
                <div style={S.cardLabel}>Results</div>
                {grpGames.map((g,i)=>{
                  const hw=g.played&&g.homeGoals>g.awayGoals;
                  const aw=g.played&&g.awayGoals>g.homeGoals;
                  const dr=g.played&&g.homeGoals===g.awayGoals;
                  return(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:3,padding:"4px 0",borderBottom:i<grpGames.length-1?"1px solid rgba(255,255,255,0.05)":"none",fontSize:9,opacity:g.played?1:0.35}}>
                      <span style={{flex:1,textAlign:"right",fontWeight:hw?700:400,color:hw?"#4ade80":dr?"#facc15":"#666",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {getFlag(g.home)} {g.home}
                      </span>
                      <span style={{width:40,textAlign:"center",flexShrink:0,fontWeight:700,color:"#ccc",fontSize:10}}>
                        {g.played?`${g.homeGoals}–${g.awayGoals}`:"vs"}
                      </span>
                      <span style={{flex:1,fontWeight:aw?700:400,color:aw?"#4ade80":dr?"#facc15":"#666",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {getFlag(g.away)} {g.away}
                      </span>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── TAB 3: LEADERBOARD ──────────────────────────────────────────────────────
function Tab3({results,loading,error,refetch}){
  if(loading) return <LoadingSpinner/>;
  if(error) return <ApiError error={error} refetch={refetch}/>;
  const actualPts=computeActualPoints(results);
  const modelPlayedPts=computeModelPlayedPts(results);
  const playerData=Object.entries(PLAYERS).map(([name,teams])=>{
    const actual=teams.reduce((s,t)=>s+(actualPts[t]||0),0);
    const modelPlayed=teams.reduce((s,t)=>s+(modelPlayedPts[t]||0),0);
    const diff=actual-modelPlayed;
    const gp=teams.reduce((s,t)=>s+results.filter(g=>g.played&&(g.home===t||g.away===t)).length,0);
    return{name,teams,actual,modelPlayed,diff,gp};
  }).sort((a,b)=>b.actual-a.actual||b.modelPlayed-a.modelPlayed);
  const maxPts=Math.max(...playerData.map(p=>p.actual),1);
  return(
    <div>
      <div style={{fontSize:10,color:"#555",marginBottom:12,lineHeight:1.6}}>
        Actual pts vs model prediction for those same games only — not the full tournament.
      </div>
      {playerData.map((p,i)=>{
        const diffColor=p.diff>0?"#4ade80":p.diff<0?"#f87171":"#888";
        const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":"";
        return(
          <div key={p.name} style={{...S.playerRow,borderLeft:`3px solid ${i===0?"#ffd700":i===1?"#c0c0c0":i===2?"#cd7f32":"rgba(255,255,255,0.08)"}`}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
              <span style={{fontSize:17,width:26,textAlign:"center"}}>{medal||<span style={{fontSize:13,color:"#444",fontWeight:700}}>{i+1}</span>}</span>
              <span style={{fontSize:14,fontWeight:700,flex:1}}>{p.name}</span>
              <div style={{textAlign:"right"}}>
                <span style={{fontSize:22,fontWeight:800,color:"#fff"}}>{p.actual}</span>
                <span style={{fontSize:10,color:"#555",marginLeft:2}}>pts</span>
              </div>
              <div style={{minWidth:48,textAlign:"right"}}>
                <span style={{fontSize:11,fontWeight:700,color:diffColor}}>{p.diff>0?"+":""}{p.diff}</span>
                <div style={{fontSize:8,color:"#444"}}>vs model</div>
              </div>
            </div>
            <div style={{...S.barBg,marginBottom:8,height:5}}>
              <div style={{...S.barFill,width:`${(p.actual/maxPts)*100}%`,background:i===0?"#ffd700":i<3?"#888":"#3b82f6"}}/>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {p.teams.map(t=>{
                const tPts=actualPts[t]||0;
                const tMod=modelPlayedPts[t]||0;
                const td=tPts-tMod;
                const grp=teamGroup(t);
                const tgp=results.filter(g=>g.played&&(g.home===t||g.away===t)).length;
                return(
                  <div key={t} style={{...S.teamChip,borderColor:GC[grp]+"66"}}>
                    <span style={{fontSize:13}}>{getFlag(t)}</span>
                    <div style={{display:"flex",flexDirection:"column",gap:0}}>
                      <span style={{fontSize:9,fontWeight:600,lineHeight:1.2}}>{t}</span>
                      <span style={{fontSize:8,color:"#555",lineHeight:1.2}}>{tgp}GP · m:{tMod}</span>
                    </div>
                    <span style={{fontSize:12,fontWeight:800,color:probColor(tPts/9)}}>{tPts}</span>
                    <span style={{fontSize:8,color:td>0?"#4ade80":td<0?"#f87171":"#555"}}>({td>0?"+":""}{td})</span>
                  </div>
                );
              })}
            </div>
            <div style={{marginTop:6,fontSize:9,color:"#333"}}>
              Model predicted: <span style={{color:"#555"}}>{p.modelPlayed} pts</span>
              <span style={{marginLeft:10,color:"#2a2a2a"}}>{p.gp} team games played</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── TAB 4: PROJECTION ───────────────────────────────────────────────────────
function Tab4({results,loading,error,refetch}){
  if(loading) return <LoadingSpinner/>;
  if(error) return <ApiError error={error} refetch={refetch}/>;
  const actualPts=computeActualPoints(results);
  const remainingPts=computeRemainingModelPts(results);
  const playerData=Object.entries(PLAYERS).map(([name,teams])=>{
    const actual=teams.reduce((s,t)=>s+(actualPts[t]||0),0);
    const remaining=teams.reduce((s,t)=>s+(remainingPts[t]||0),0);
    const projected=actual+remaining;
    const gp=teams.reduce((s,t)=>s+results.filter(g=>g.played&&(g.home===t||g.away===t)).length,0);
    return{name,teams,actual,remaining,projected,gp};
  }).sort((a,b)=>b.projected-a.projected||b.actual-a.actual);
  const maxProj=Math.max(...playerData.map(p=>p.projected),1);
  return(
    <div>
      <div style={{fontSize:10,color:"#555",marginBottom:12,lineHeight:1.6}}>
        Projected = actual points + model prediction for remaining games.
      </div>
      {playerData.map((p,i)=>{
        const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":"";
        return(
          <div key={p.name} style={{...S.playerRow,borderLeft:`3px solid ${i===0?"#ffd700":i===1?"#c0c0c0":i===2?"#cd7f32":"rgba(255,255,255,0.08)"}`}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
              <span style={{fontSize:17,width:26,textAlign:"center"}}>{medal||<span style={{fontSize:13,color:"#444",fontWeight:700}}>{i+1}</span>}</span>
              <span style={{fontSize:14,fontWeight:700,flex:1}}>{p.name}</span>
              <div style={{textAlign:"right",marginRight:6}}>
                <span style={{fontSize:10,color:"#555"}}>actual </span>
                <span style={{fontSize:14,fontWeight:700,color:"#aaa"}}>{p.actual}</span>
                <span style={{fontSize:10,color:"#333",margin:"0 3px"}}>+</span>
                <span style={{fontSize:14,fontWeight:700,color:"#facc15"}}>{p.remaining}</span>
              </div>
              <div style={{textAlign:"right",minWidth:44}}>
                <span style={{fontSize:24,fontWeight:800,color:"#fff"}}>{p.projected}</span>
                <div style={{fontSize:8,color:"#555"}}>projected</div>
              </div>
            </div>
            <div style={{...S.barBg,marginBottom:8,height:7,position:"relative"}}>
              <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${(p.projected/maxProj)*100}%`,background:"rgba(250,204,21,0.18)",borderRadius:2}}/>
              <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${(p.actual/maxProj)*100}%`,background:i===0?"#ffd700":i<3?"#888":"#3b82f6",borderRadius:2,opacity:0.9}}/>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {p.teams.map(t=>{
                const tA=actualPts[t]||0;
                const tR=remainingPts[t]||0;
                const grp=teamGroup(t);
                const tgp=results.filter(g=>g.played&&(g.home===t||g.away===t)).length;
                return(
                  <div key={t} style={{...S.teamChip,borderColor:GC[grp]+"66"}}>
                    <span style={{fontSize:13}}>{getFlag(t)}</span>
                    <div style={{display:"flex",flexDirection:"column",gap:0}}>
                      <span style={{fontSize:9,fontWeight:600,lineHeight:1.2}}>{t}</span>
                      <span style={{fontSize:8,color:"#555",lineHeight:1.2}}>{tgp}GP</span>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:0}}>
                      <span style={{fontSize:12,fontWeight:800,color:probColor((tA+tR)/9)}}>{tA+tR}</span>
                      <span style={{fontSize:8,color:"#444"}}>{tA}+{tR}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
      <p style={{fontSize:9,color:"#2a2a2a",marginTop:12}}>Solid bar = secured · Faded = projected remaining</p>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState(3);
  const [selected, setSelected] = useState(null);
  const [filter, setFilter] = useState("ALL");
  const [groupFilter, setGroupFilter] = useState("ALL");
  const { results, loading, error, lastUpdated, cacheStats, refetch, clearCache } = useWorldCupData();
  const tabs = ["Perfect %","Results","Leaderboard","Projection"];

  return (
    <div style={S.root}>
      <div style={S.header}>
        <div style={{fontSize:34,marginBottom:5}}>🏆</div>
        <h1 style={S.title}>2026 World Cup</h1>
        <p style={S.subtitle}>Group Stage Tracker</p>
      </div>

      {/* Status Bar */}
      <div style={{padding:"8px 16px",borderBottom:"1px solid rgba(255,255,255,0.06)",background:"rgba(0,0,0,0.3)",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <span style={{fontSize:10,color:error?"#f87171":"#4ade80",fontWeight:600}}>
          {loading?"● LOADING...":error?"● ERROR":"● LIVE"}
        </span>
        {lastUpdated && (
          <span style={{fontSize:10,color:"#444"}}>
            Updated {lastUpdated.toLocaleTimeString()}
          </span>
        )}
        <span style={{fontSize:10,color:"#333"}}>
          {cacheStats.cached}/{cacheStats.total} results cached
        </span>
        <div style={{flex:1}}/>
        <button onClick={refetch} disabled={loading}
          style={{...S.filterBtn,background:"rgba(255,255,255,0.06)",color:"#888",border:"1px solid rgba(255,255,255,0.1)",fontSize:10,padding:"3px 10px"}}>
          {loading?"...":"↻ Refresh"}
        </button>
        <button onClick={clearCache}
          style={{...S.filterBtn,background:"transparent",color:"#333",border:"1px solid rgba(255,255,255,0.06)",fontSize:10,padding:"3px 10px"}}
          title="Clear cache and re-fetch">
          ✕ Cache
        </button>
      </div>

      <div style={S.tabBar}>
        {tabs.map((t,i)=>(
          <button key={i} onClick={()=>setTab(i)} style={{...S.tabBtn,
            borderBottom:tab===i?"2px solid #fff":"2px solid transparent",
            color:tab===i?"#fff":"#555"}}>
            {t}
          </button>
        ))}
      </div>

      <div style={S.body}>
        {tab===0&&<Tab1 selected={selected} setSelected={setSelected} filter={filter} setFilter={setFilter}/>}
        {tab===1&&<Tab2 results={results} loading={loading} error={error} refetch={refetch} groupFilter={groupFilter} setGroupFilter={setGroupFilter}/>}
        {tab===2&&<Tab3 results={results} loading={loading} error={error} refetch={refetch}/>}
        {tab===3&&<Tab4 results={results} loading={loading} error={error} refetch={refetch}/>}
      </div>

      <div style={{textAlign:"center",padding:"12px",fontSize:9,color:"#2a2a2a"}}>
        Model: 62.5% threshold · +5% home boost (MEX/USA/CAN) · Data: openfootball/worldcup.json
      </div>
    </div>
  );
}

};


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
